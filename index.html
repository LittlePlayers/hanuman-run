<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="description" content="Hanuman Run — leap over rocks and rakshasas, duck under flying asuras, race to Lanka! An Indian mythology endless runner game for kids." />
<title>🐒 Hanuman Run — Little Players</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐒</text></svg>" />
<style>
  :root{ --saffron:#ff7a00; --gold:#ffcf40; --ink:#2a1500; }
  *{box-sizing:border-box}
  html,body{overscroll-behavior:none; margin:0}
  body{
    min-height:100vh; color:#fff;
    font-family:"Baloo 2","Trebuchet MS",system-ui,sans-serif;
    background:linear-gradient(180deg,#3a1d00,#1a0c00);
    display:flex; flex-direction:column; align-items:center; padding:14px;
  }
  h1{margin:6px 0 2px; font-size:clamp(1.6rem,6vw,2.4rem); color:var(--gold);
     text-shadow:0 2px 0 #b35900}
  .sub{margin:0 0 10px; color:#ffd9a8; font-weight:700}

  .frame{width:min(820px,96vw); position:relative; border-radius:16px; overflow:hidden;
    box-shadow:0 12px 36px rgba(0,0,0,.5); border:4px solid var(--gold)}
  canvas{display:block; width:100%; height:auto; background:#87CEEB; touch-action:none}

  .touch{display:none; gap:14px; margin-top:12px}
  .touch button{border:none; cursor:pointer; font:inherit; font-weight:900; font-size:1.2rem;
    padding:16px 26px; border-radius:16px; color:#fff; box-shadow:0 6px 0 #9a4d00;
    background:linear-gradient(180deg,#ff9a33,#ff7a00)}
  .touch button:active{transform:translateY(4px); box-shadow:0 2px 0 #9a4d00}
  body.touch-on .touch{display:flex}

  .help{margin-top:10px; color:#ffd9a8; font-weight:700; font-size:.92rem; text-align:center}
  .back{margin-top:12px}
  .back a{color:var(--gold); font-weight:800; text-decoration:none}
</style>
</head>
<body>
  <h1>🐒 Hanuman Run</h1>
  <p class="sub">Leap over demons, duck under arrows — run to Lanka!</p>

  <div class="frame"><canvas id="cv" width="820" height="300"></canvas></div>

  <div class="touch">
    <button id="btnJump">⬆ Jump</button>
    <button id="btnDuck">⬇ Duck</button>
  </div>

  <p class="help">SPACE / ↑ = Jump &nbsp;·&nbsp; ↓ = Duck &nbsp;·&nbsp; tap the screen to start</p>
  <p class="back"><a href="https://littleplayers.github.io/">← Back to Little Players</a></p>

<script>
(function(){
  const cv=document.getElementById("cv"), ctx=cv.getContext("2d");
  const W=cv.width, H=cv.height, GROUND=H-46;
  const GRAV=0.62, JUMP=-12.4;
  const WIN_SCORE=8000;

  let hi=+(localStorage.getItem("hanumanHi")||0);
  let state="idle";              // idle | playing | dead | win
  let speed=6, score=0, obstacles=[], spawnT=0, dayPhase=0, petals=[], confetti=[], t0=0;
  const player={x:90,y:GROUND,vy:0,onGround:true,duck:false,leg:0,arm:0};

  // ----- input -----
  function jump(){
    if(state==="idle"||state==="dead"||state==="win"){ start(); return; }
    if(player.onGround){ player.vy=JUMP; player.onGround=false; }
  }
  function duckOn(){ if(state==="playing") player.duck=true; }
  function duckOff(){ player.duck=false; }

  addEventListener("keydown",e=>{
    if(e.code==="Space"||e.code==="ArrowUp"){ e.preventDefault(); jump(); }
    else if(e.code==="ArrowDown"){ e.preventDefault(); duckOn(); }
  });
  addEventListener("keyup",e=>{ if(e.code==="ArrowDown") duckOff(); });
  cv.addEventListener("pointerdown",e=>{ e.preventDefault(); jump(); });
  // touch buttons
  const bj=document.getElementById("btnJump"), bd=document.getElementById("btnDuck");
  const press=(el,on,off)=>{ el.addEventListener("touchstart",e=>{e.preventDefault();on();},{passive:false});
    el.addEventListener("touchend",e=>{e.preventDefault();off&&off();},{passive:false});
    el.addEventListener("mousedown",on); el.addEventListener("mouseup",()=>off&&off()); };
  press(bj,jump); press(bd,duckOn,duckOff);
  if(("ontouchstart" in window)||navigator.maxTouchPoints>0) document.body.classList.add("touch-on");

  // ----- game flow -----
  function start(){
    state="playing"; speed=6; score=0; obstacles=[]; spawnT=0; dayPhase=0;
    petals=[]; confetti=[];
    player.y=GROUND; player.vy=0; player.onGround=true; player.duck=false;
    t0=performance.now();
  }

  function spawn(){
    const r=Math.random();
    if(r<0.55){ // ground obstacle -> JUMP
      const kinds=[
        {type:"rock",  w:30,h:30},
        {type:"rock",  w:46,h:44},
        {type:"fire",  w:34,h:40},
        {type:"demon", w:40,h:62},
      ];
      const k=kinds[Math.floor(Math.random()*kinds.length)];
      obstacles.push({...k, x:W+20, y:GROUND-k.h, fly:false, f:0});
    } else { // flying obstacle -> DUCK
      const kinds=[
        {type:"asura", w:50,h:34},
        {type:"crow",  w:40,h:26},
        {type:"arrow", w:60,h:14},
      ];
      const k=kinds[Math.floor(Math.random()*kinds.length)];
      const yTop=GROUND-72-(Math.random()*20);
      obstacles.push({...k, x:W+20, y:yTop, fly:true, f:0});
    }
  }

  function rects(a,b){ return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y; }

  function update(dt){
    score+=speed*dt*0.06;
    if(score>200) speed=6+Math.min(8, (score-200)/700);   // accelerate
    dayPhase=(score/4000)%2;                                // day/night cycle

    // physics
    player.vy+=GRAV; player.y+=player.vy;
    if(player.y>=GROUND){ player.y=GROUND; player.vy=0; player.onGround=true; }
    else player.onGround=false;
    if(player.onGround) player.leg=(player.leg+speed*0.6)%100;
    player.arm+=0.15;

    // spawn
    spawnT-=dt;
    if(spawnT<=0){ spawn(); spawnT=70 - Math.min(34,speed*3) + Math.random()*40; }

    // move + collide
    const hb = player.duck
      ? {x:player.x+6,y:player.y-26,w:46,h:26}
      : {x:player.x+8,y:player.y-52,w:34,h:52};
    for(const o of obstacles){ o.x-=speed; o.f+=0.2;
      const ob={x:o.x+5,y:o.y+5,w:o.w-10,h:o.h-8};
      if(rects(hb,ob)){ die(); }
    }
    obstacles=obstacles.filter(o=>o.x+o.w>-10);

    // petals ambiance
    if(Math.random()<0.04) petals.push({x:W+10,y:Math.random()*120,vx:-(speed*0.4+0.5),s:6+Math.random()*6,r:Math.random()*6});
    petals.forEach(p=>{ p.x+=p.vx; p.y+=Math.sin((p.x+p.r)*0.05)*0.4; p.r+=0.05; });
    petals=petals.filter(p=>p.x>-12);

    if(score>=WIN_SCORE) win();
  }

  function die(){
    state="dead";
    hi=Math.max(hi,Math.floor(score)); localStorage.setItem("hanumanHi",hi);
  }
  function win(){
    state="win";
    hi=Math.max(hi,Math.floor(score)); localStorage.setItem("hanumanHi",hi);
    for(let i=0;i<120;i++) confetti.push({x:W/2,y:H/2,vx:(Math.random()-.5)*9,vy:(Math.random()-1)*9,
      c:["#ff7a00","#ffcf40","#ff3b3b","#36c","#2bbf6a","#fff"][i%6],r:3+Math.random()*4});
  }

  // ----- drawing -----
  function lerp(a,b,t){return a+(b-a)*t;}
  function dayColor(){
    // 0..1 day, 1..2 night
    const night = dayPhase>1 ? (dayPhase-1) : (dayPhase<1?0:1);
    const f = dayPhase<=1 ? dayPhase : 2-dayPhase; // 0 day .. 1 night-ish (triangle)
    const top = [lerp(74,12,f), lerp(144,20,f), lerp(217,60,f)];
    const bot = [lerp(135,30,f), lerp(206,40,f), lerp(235,90,f)];
    return {top:`rgb(${top.map(Math.round).join(",")})`, bot:`rgb(${bot.map(Math.round).join(",")})`, night:f};
  }

  function drawBg(){
    const c=dayColor();
    const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,c.top); g.addColorStop(1,c.bot);
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // sun / moon
    const sx=W-90, sy=60;
    ctx.fillStyle = c.night>0.5 ? "#fdf6d0" : "#fff3b0";
    ctx.beginPath(); ctx.arc(sx,sy,26,0,7); ctx.fill();
    if(c.night>0.6){ ctx.fillStyle=c.top; ctx.beginPath(); ctx.arc(sx-10,sy-6,24,0,7); ctx.fill();
      // stars
      ctx.fillStyle="rgba(255,255,255,"+(c.night)+")";
      for(let i=0;i<18;i++){ const x=(i*97+ (Math.sin(i*9)*40))%W, y=(i*53)%120; ctx.fillRect(x,y,2,2); } }
    // mountains (parallax slow)
    drawMountains();
    // temples
    drawTemples();
    // ground
    ctx.fillStyle="#d9a05b"; ctx.fillRect(0,GROUND,W,H-GROUND);
    ctx.fillStyle="#b9803f";
    const off=(score*4)%40;
    for(let x=-off;x<W;x+=40) ctx.fillRect(x,GROUND,20,6);
  }
  function drawMountains(){
    ctx.fillStyle="rgba(90,60,40,.55)";
    const off=(score*0.6)%320;
    for(let bx=-off;bx<W+320;bx+=320){
      ctx.beginPath(); ctx.moveTo(bx,GROUND);
      ctx.lineTo(bx+90,GROUND-110); ctx.lineTo(bx+150,GROUND-60);
      ctx.lineTo(bx+220,GROUND-130); ctx.lineTo(bx+320,GROUND); ctx.closePath(); ctx.fill();
    }
  }
  function drawTemples(){
    const off=(score*1.4)%360;
    ctx.fillStyle="rgba(150,90,40,.8)";
    for(let bx=-off;bx<W+360;bx+=360){
      const baseY=GROUND, w=46;
      // shikhara (tower)
      ctx.beginPath(); ctx.moveTo(bx,baseY); ctx.lineTo(bx+w/2,baseY-70); ctx.lineTo(bx+w,baseY); ctx.closePath(); ctx.fill();
      ctx.fillRect(bx+w/2-3,baseY-82,6,14);            // kalash spire
      ctx.fillStyle="rgba(120,70,30,.8)"; ctx.fillRect(bx-8,baseY-26,w+16,26); // base
      ctx.fillStyle="rgba(150,90,40,.8)";
    }
  }

  function drawHanuman(){
    const x=player.x, y=player.y, duck=player.duck;
    ctx.save(); ctx.translate(x,y);
    const bodyH = duck?26:46, bodyW=duck?40:30, headR=duck?13:15;
    const topY = -bodyH-headR*1.2;
    // tail (curled)
    ctx.strokeStyle="#c75a00"; ctx.lineWidth=6; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(duck?-4:0,-bodyH+6);
    ctx.quadraticCurveTo(-30,-bodyH-6,-26,-bodyH-30);
    ctx.quadraticCurveTo(-22,-bodyH-44,-10,-bodyH-40); ctx.stroke();
    // body (saffron)
    ctx.fillStyle="#ff7a00";
    roundRect(duck?-2:0,-bodyH,bodyW,bodyH,8); ctx.fill();
    // dhoti band
    ctx.fillStyle="#ffcf40"; ctx.fillRect(duck?-2:0,-12,bodyW,7);
    // legs (running)
    ctx.strokeStyle="#e06b00"; ctx.lineWidth=6;
    if(player.onGround && state==="playing"){
      const s=Math.sin(player.leg*0.25)*8;
      leg(8+(duck?0:0), 0, s); leg(20,0,-s);
    } else { leg(8,0,4); leg(20,0,-2); }
    // arm with mace (gada)
    ctx.save(); ctx.translate(duck?30:24,-bodyH+10);
    ctx.rotate(duck?0.2:Math.sin(player.arm)*0.15-0.3);
    ctx.strokeStyle="#e06b00"; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(16,-14); ctx.stroke();
    ctx.fillStyle="#ffcf40"; ctx.beginPath(); ctx.arc(18,-20,8,0,7); ctx.fill();   // mace head
    ctx.fillStyle="#c79200"; ctx.fillRect(15,-14,6,4);
    ctx.restore();
    // head
    const hx=duck?bodyW-6:bodyW-4, hy=topY+headR;
    ctx.fillStyle="#ff8c1a"; ctx.beginPath(); ctx.arc(hx,hy,headR,0,7); ctx.fill();
    // muzzle
    ctx.fillStyle="#ffd9a8"; ctx.beginPath(); ctx.ellipse(hx+headR*0.5,hy+3,headR*0.55,headR*0.42,0,0,7); ctx.fill();
    // eyes
    ctx.fillStyle="#3a1500"; ctx.beginPath(); ctx.arc(hx+2,hy-3,2,0,7); ctx.arc(hx+headR*0.5,hy-3,2,0,7); ctx.fill();
    // crown (gold)
    ctx.fillStyle="#ffcf40";
    ctx.beginPath(); ctx.moveTo(hx-headR*0.7,hy-headR*0.7);
    ctx.lineTo(hx-headR*0.5,hy-headR*1.5); ctx.lineTo(hx-headR*0.2,hy-headR*0.8);
    ctx.lineTo(hx+headR*0.1,hy-headR*1.6); ctx.lineTo(hx+headR*0.4,hy-headR*0.8);
    ctx.lineTo(hx+headR*0.6,hy-headR*1.4); ctx.lineTo(hx+headR*0.75,hy-headR*0.6); ctx.closePath(); ctx.fill();
    ctx.restore();

    function leg(lx,ly,sw){ ctx.beginPath(); ctx.moveTo(lx,-2); ctx.lineTo(lx+sw,10); ctx.stroke(); }
  }

  function roundRect(x,y,w,h,r){ ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  function drawObstacle(o){
    ctx.save(); ctx.translate(o.x,o.y);
    if(o.type==="rock"){ ctx.fillStyle="#6b5847"; roundRect(0,0,o.w,o.h,6); ctx.fill();
      ctx.fillStyle="#574638"; roundRect(4,4,o.w-12,o.h-10,5); ctx.fill(); }
    else if(o.type==="fire"){ ctx.fillStyle="#3a2a1a"; ctx.fillRect(0,o.h-8,o.w,8);
      const fl=Math.sin(o.f)*3;
      ctx.fillStyle="#ff5a00"; flame(o.w/2,o.h-6,14,o.h-6+fl);
      ctx.fillStyle="#ffcf40"; flame(o.w/2,o.h-6,8,o.h-16+fl); }
    else if(o.type==="demon"){ // rakshasa
      ctx.fillStyle="#5a2d6e"; roundRect(2,10,o.w-4,o.h-10,7); ctx.fill();
      ctx.fillStyle="#7a3d92"; ctx.beginPath(); ctx.arc(o.w/2,12,12,0,7); ctx.fill(); // head
      ctx.fillStyle="#ffea00"; ctx.beginPath(); ctx.arc(o.w/2-4,11,2.5,0,7); ctx.arc(o.w/2+4,11,2.5,0,7); ctx.fill();
      ctx.strokeStyle="#3a1d4a"; ctx.lineWidth=3; // horns
      ctx.beginPath(); ctx.moveTo(o.w/2-8,4); ctx.lineTo(o.w/2-12,-4);
      ctx.moveTo(o.w/2+8,4); ctx.lineTo(o.w/2+12,-4); ctx.stroke();
      ctx.fillStyle="#fff"; ctx.fillRect(o.w/2-6,16,3,3); ctx.fillRect(o.w/2+3,16,3,3); } // teeth
    else if(o.type==="crow"){ ctx.fillStyle="#222";
      const fw=Math.sin(o.f)*8;
      ctx.beginPath(); ctx.ellipse(o.w/2,o.h/2,o.w/2,o.h/2,0,0,7); ctx.fill();
      ctx.beginPath(); ctx.moveTo(o.w/2-4,o.h/2); ctx.lineTo(0,o.h/2-fw); ctx.lineTo(o.w/2-4,o.h/2-4); ctx.fill();
      ctx.beginPath(); ctx.moveTo(o.w/2+4,o.h/2); ctx.lineTo(o.w,o.h/2-fw); ctx.lineTo(o.w/2+4,o.h/2-4); ctx.fill();
      ctx.fillStyle="#ffae00"; ctx.beginPath(); ctx.moveTo(o.w-2,o.h/2); ctx.lineTo(o.w+6,o.h/2+2); ctx.lineTo(o.w-2,o.h/2+4); ctx.fill(); }
    else if(o.type==="asura"){ ctx.fillStyle="#2e7d32";
      const fw=Math.sin(o.f)*6;
      ctx.beginPath(); ctx.ellipse(o.w/2,o.h/2,o.w/2,o.h/2-2,0,0,7); ctx.fill();
      ctx.fillStyle="#1b5e20"; // wings
      ctx.beginPath(); ctx.moveTo(o.w/2,o.h/2); ctx.lineTo(2,-fw); ctx.lineTo(o.w/2-6,o.h/2-2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(o.w/2,o.h/2); ctx.lineTo(o.w-2,-fw); ctx.lineTo(o.w/2+6,o.h/2-2); ctx.fill();
      ctx.fillStyle="#ffea00"; ctx.beginPath(); ctx.arc(o.w/2-5,o.h/2,2,0,7); ctx.arc(o.w/2+5,o.h/2,2,0,7); ctx.fill(); }
    else if(o.type==="arrow"){ ctx.fillStyle="#7a4a1f"; ctx.fillRect(6,o.h/2-2,o.w-6,4);
      ctx.fillStyle="#bbb"; ctx.beginPath(); ctx.moveTo(0,o.h/2); ctx.lineTo(12,o.h/2-6); ctx.lineTo(12,o.h/2+6); ctx.fill();
      ctx.fillStyle="#ff3b3b"; ctx.fillRect(o.w-6,o.h/2-5,5,10); }
    ctx.restore();
    function flame(cx,cy,w,ty){ ctx.beginPath(); ctx.moveTo(cx-w,cy); ctx.quadraticCurveTo(cx-w,ty,cx,ty-6);
      ctx.quadraticCurveTo(cx+w,ty,cx+w,cy); ctx.closePath(); ctx.fill(); }
  }

  function drawPetals(){ ctx.fillStyle="rgba(255,140,160,.85)";
    petals.forEach(p=>{ ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r);
      ctx.beginPath(); ctx.ellipse(0,0,p.s,p.s*0.5,0,0,7); ctx.fill(); ctx.restore(); }); }

  function overlay(title,sub,color){
    ctx.fillStyle="rgba(0,0,0,.45)"; ctx.fillRect(0,0,W,H);
    ctx.textAlign="center";
    ctx.fillStyle=color; ctx.font="bold 40px 'Baloo 2',sans-serif"; ctx.fillText(title,W/2,H/2-6);
    ctx.fillStyle="#fff"; ctx.font="bold 18px 'Baloo 2',sans-serif"; ctx.fillText(sub,W/2,H/2+28);
    ctx.font="14px 'Baloo 2',sans-serif"; ctx.fillStyle="#ffd9a8";
    ctx.fillText("High Score: "+hi,W/2,H/2+54);
  }

  function drawHUD(){
    ctx.textAlign="right"; ctx.fillStyle="#fff"; ctx.font="bold 18px 'Baloo 2',sans-serif";
    ctx.fillText("Score "+Math.floor(score),W-14,28);
    ctx.fillStyle="#ffd9a8"; ctx.font="13px 'Baloo 2',sans-serif";
    ctx.fillText("Best "+hi,W-14,46);
  }

  // ----- loop -----
  let last=performance.now();
  function frame(now){
    const dt=Math.min(2.5,(now-last)/16.67); last=now;
    if(state==="playing") update(dt);
    drawBg(); drawPetals();
    obstacles.forEach(drawObstacle);
    drawHanuman();
    if(state==="playing"||state==="dead"||state==="win") drawHUD();

    if(state==="idle") overlay("🐒 Hanuman Run","Press SPACE / tap to start","#ffcf40");
    if(state==="dead") overlay("Oh no! 😵","Press SPACE / tap to try again","#ff7a55");
    if(state==="win"){
      confetti.forEach(c=>{ c.x+=c.vx; c.y+=c.vy; c.vy+=0.25; ctx.fillStyle=c.c; ctx.fillRect(c.x,c.y,c.r,c.r); });
      confetti=confetti.filter(c=>c.y<H+10);
      overlay("विजय! Victory! 🎉","You reached Lanka! Tap to play again","#ffcf40");
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
